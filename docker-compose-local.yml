services:

  postgres:
    image: postgres:16
    container_name: transporte-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: transporte_escolar
      POSTGRES_USER: transporte
      POSTGRES_PASSWORD: transporte123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: